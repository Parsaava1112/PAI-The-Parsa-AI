name: pai
description: Parsa AI App
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  font_awesome_flutter: ^10.5.0
  flutter_animate: ^4.2.0
  google_fonts: ^4.0.4
  package_info_plus: ^4.2.0
  url_launcher: ^6.2.1
  sqflite: ^2.3.0
  path: ^1.8.3
  lottie: ^2.7.0
  shimmer: ^3.0.0
  sqflite_common_ffi: ^2.3.0
  flutter_tts: ^3.8.0
  geolocator: ^10.1.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 48

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/lottie/
    - assets/images/
    - assets/lottie/weather/
    - assets/images/backgrounds/

  fonts:
    - family: Vazir
      fonts:
        - asset: assets/fonts/Vazir.ttf