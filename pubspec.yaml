name: pai
description: Parsa AI App
publish_to: 'none'
version: 2.1.2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  font_awesome_flutter: ^10.5.0
  flutter_animate: ^4.2.0          # ← انیمیشن‌های میکرو
  google_fonts: ^4.0.4
  package_info_plus: ^4.2.0
  url_launcher: ^6.2.1
  sqflite: ^2.3.0
  path: ^1.8.3
  lottie: ^2.7.0
  sqflite_common_ffi: ^2.3.0
  flutter_tts: ^3.8.0
  geolocator: ^10.1.0
  sensors_plus: ^4.0.2   # یا آخرین نسخه (ممکنه تو بخش‌های دیگه استفاده بشه)
  shimmer: ^3.0.0

  # بسته‌های اضافه‌شده برای ویژگی‌های جدید
  flutter_markdown: ^0.7.2+1       # نمایش پیام‌های AI با مارک‌داون و کد
  share_plus: ^7.2.1               # اشتراک‌گذاری (دکمه Share در منوی پیام)

  # ===== بسته‌های مورد نیاز صفحه تنظیمات جدید =====
  ambient_light: ^0.1.4            # دریافت نور محیط برای تم هوشمند
  palette_generator: ^0.3.3+1     # استخراج پالت رنگ از عکس (تم جادویی)
  image_picker: ^1.0.7            # انتخاب عکس از گالری

  package_info_plus: ^8.0.0  # آخرین نسخه

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 48

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/lottie/
    - assets/images/
    - assets/lottie/weather/
    - assets/images/backgrounds/

  fonts:
    - family: Vazir
      fonts:
        - asset: assets/fonts/Vazir.ttf